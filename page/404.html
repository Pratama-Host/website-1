<!doctype html>
<html lang="id" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
             script-src 'self' 'unsafe-inline';
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
             font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
             img-src 'self' data: blob: *;
             media-src 'self' data: blob: *;
             connect-src 'self';"
    />

    <title>404 — Halaman Tidak Ditemukan | TKJ XI-9</title>
    <meta
      name="description"
      content="Halaman yang kamu cari tidak ditemukan. Kembali ke beranda TKJ XI-9 SMK Muhammadiyah Belitang."
    />
    <meta name="robots" content="noindex, nofollow" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23b91c1c'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='700' font-size='13' fill='white'>TKJ</text></svg>"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../style.css" />

    <script>
      /* Apply saved theme sebelum paint untuk menghindari flash */
      (function () {
        const t = localStorage.getItem("tkj-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <style>
      /* 404-specific overrides */
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: 0;
        overflow: hidden;
      }

      /* Animated grid background */
      .nf-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: bgDrift 20s linear infinite;
      }
      @keyframes bgDrift {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 40px 40px;
        }
      }

      /* Glitching scan line */
      .nf-scan {
        position: fixed;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(239, 68, 68, 0.4),
          transparent
        );
        animation: scanLine 3s linear infinite;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes scanLine {
        from {
          top: -2px;
        }
        to {
          top: 100%;
        }
      }

      .nf-wrap {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 480px;
      }

      .nf-code {
        font-family: "Fira Code", monospace;
        font-size: clamp(5rem, 22vw, 9rem);
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        text-shadow: 0 0 40px var(--glow);
        letter-spacing: -0.04em;
        animation: glitch 4s infinite;
        position: relative;
        display: inline-block;
      }
      .nf-code::before {
        content: "404";
        position: absolute;
        top: 0;
        left: 0;
        color: rgba(248, 113, 113, 0.6);
        animation: glitchR 4s infinite;
        clip-path: polygon(0 15%, 100% 15%, 100% 40%, 0 40%);
      }
      .nf-code::after {
        content: "404";
        position: absolute;
        top: 0;
        left: 0;
        color: rgba(239, 68, 68, 0.3);
        animation: glitchL 4s infinite;
        clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%);
      }

      .nf-mono {
        font-family: "Fira Code", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-bottom: 12px;
        opacity: 0.7;
      }

      .nf-title {
        font-family: "Rajdhani", sans-serif;
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 700;
        color: var(--text-1);
        margin: 12px 0 10px;
      }

      .nf-desc {
        font-size: var(--text-sm);
        color: var(--text-2);
        line-height: 1.7;
        margin-bottom: 32px;
      }

      .nf-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }

      /* Terminal blink cursor */
      .nf-terminal {
        font-family: "Fira Code", monospace;
        font-size: var(--text-xs);
        color: var(--text-3);
        margin-top: 32px;
        letter-spacing: 0.08em;
      }
      .nf-terminal .cursor {
        display: inline-block;
        width: 8px;
        height: 1.1em;
        background: var(--accent);
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Floating particles */
      .nf-particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .nf-particle {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: particle var(--dur, 8s) var(--delay, 0s) linear infinite;
      }
      @keyframes particle {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 0.4;
        }
        90% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      /* Countdown to redirect (optional) */
      .nf-redirect {
        font-family: "Fira Code", monospace;
        font-size: var(--text-xs);
        color: var(--text-3);
        margin-top: 16px;
      }
      .nf-redirect span {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <!-- Animated network background -->
    <canvas id="network-canvas"></canvas>

    <div class="nf-bg" aria-hidden="true"></div>
    <div class="nf-scan" aria-hidden="true"></div>

    <!-- Particles -->
    <div class="nf-particles" aria-hidden="true">
      <div class="nf-particle" style="left: 10%; --dur: 9s; --delay: 0s"></div>
      <div class="nf-particle" style="left: 25%; --dur: 7s; --delay: 1s"></div>
      <div class="nf-particle" style="left: 40%; --dur: 11s; --delay: 2s"></div>
      <div
        class="nf-particle"
        style="left: 55%; --dur: 8s; --delay: 0.5s"
      ></div>
      <div class="nf-particle" style="left: 70%; --dur: 10s; --delay: 3s"></div>
      <div
        class="nf-particle"
        style="left: 85%; --dur: 6s; --delay: 1.5s"
      ></div>
    </div>

    <main class="nf-wrap" aria-labelledby="nf-title">
      <div class="nf-mono" aria-hidden="true">// ERROR: ROUTE_NOT_FOUND</div>

      <div class="nf-code" aria-label="Error 404">404</div>

      <h1 class="nf-title" id="nf-title">Halaman Tidak Ditemukan</h1>

      <p class="nf-desc">
        Rute yang kamu minta tidak ada dalam sistem.<br />
        Mungkin URL salah, atau halaman sudah dipindahkan.
      </p>

      <div class="nf-actions">
        <a href="../index.html" class="btn btn-primary">
          <i class="fas fa-house" aria-hidden="true"></i> Kembali ke Beranda
        </a>
        <a href="members.html" class="btn btn-outline">
          <i class="fas fa-users" aria-hidden="true"></i> Lihat Anggota
        </a>
      </div>

      <!-- Quick nav links -->
      <div
        style="
          display: flex;
          gap: 16px;
          justify-content: center;
          flex-wrap: wrap;
          margin-bottom: 24px;
        "
      >
        <a
          href="about.html"
          style="
            font-size: var(--text-xs);
            color: var(--text-3);
            font-family: &quot;Fira Code&quot;, monospace;
            transition: color 0.25s;
          "
          onmouseover="this.style.color = 'var(--accent)'"
          onmouseout="this.style.color = 'var(--text-3)'"
          >about</a
        >
        <a
          href="structure.html"
          style="
            font-size: var(--text-xs);
            color: var(--text-3);
            font-family: &quot;Fira Code&quot;, monospace;
            transition: color 0.25s;
          "
          onmouseover="this.style.color = 'var(--accent)'"
          onmouseout="this.style.color = 'var(--text-3)'"
          >structure</a
        >
        <a
          href="gallery.html"
          style="
            font-size: var(--text-xs);
            color: var(--text-3);
            font-family: &quot;Fira Code&quot;, monospace;
            transition: color 0.25s;
          "
          onmouseover="this.style.color = 'var(--accent)'"
          onmouseout="this.style.color = 'var(--text-3)'"
          >gallery</a
        >
        <a
          href="skills.html"
          style="
            font-size: var(--text-xs);
            color: var(--text-3);
            font-family: &quot;Fira Code&quot;, monospace;
            transition: color 0.25s;
          "
          onmouseover="this.style.color = 'var(--accent)'"
          onmouseout="this.style.color = 'var(--text-3)'"
          >skills</a
        >
        <a
          href="tkj.html"
          style="
            font-size: var(--text-xs);
            color: var(--text-3);
            font-family: &quot;Fira Code&quot;, monospace;
            transition: color 0.25s;
          "
          onmouseover="this.style.color = 'var(--accent)'"
          onmouseout="this.style.color = 'var(--text-3)'"
          >tkj</a
        >
      </div>

      <div class="nf-terminal" aria-live="polite">
        <span id="nf-typetext">$ ping beranda.tkj-xi9 --ttl=5</span
        ><span class="cursor" aria-hidden="true"></span>
      </div>

      <p class="nf-redirect" id="nf-redirect-wrap">
        Hitungan: <span id="nf-countdown">10</span> detik...
      </p>
    </main>

    <script src="../settings.js"></script>
    <script src="../index.js"></script>
  </body>
</html>
