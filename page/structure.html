  <body>
    <!-- Animated network background -->
    <canvas id="network-canvas"></canvas>

    <a class="skip-link" href="#main-content">Lewati ke konten utama</a>
    <div id="page-progress" aria-hidden="true"></div>

    <header class="top-bar" role="banner">
      <div class="top-bar-brand">
        <a href="../index.html" aria-label="TKJ XI-9 — Beranda">
          <img
            id="brand-logo"
            src="../assets/logo/logo-utama.svg"
            alt="Logo TKJ XI-9"
            class="brand-badge brand-logo"
            role="button"
            tabindex="0"
            aria-label="Klik untuk memperbesar logo"
          />
          <div>
            <div class="brand-name">TKJ XI-9</div>
            <div class="brand-year mono">2025/2026</div>
          </div>
        </a>
      </div>
      <div class="top-bar-actions">
        <!-- Theme toggle & hamburger will be placed here by JS -->
      </div>
    </header>

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="../index.html"
        ><i class="fas fa-house" aria-hidden="true"></i> Beranda</a
      >
      <i class="fas fa-chevron-right" aria-hidden="true"></i>
      <span class="bc-current" aria-current="page">Struktur</span>
    </nav>

    <main class="page container" id="main-content">
      <div class="sec-head">
        <div class="sec-tag">Kepengurusan</div>
        <h1 class="sec-title">Struktur Organisasi</h1>
        <p class="sec-desc">
          Susunan kepengurusan kelas TKJ XI-9 tahun ajaran 2025/2026.
        </p>
      </div>

      <!-- Print button (only visible on screen) -->
      <div style="text-align: right; margin-bottom: 16px" class="no-print">
        <button
          class="btn btn-outline btn-sm"
          onclick="window.print()"
          aria-label="Cetak struktur organisasi"
        >
          <i class="fas fa-print" aria-hidden="true"></i> Cetak
        </button>
      </div>

      <div
        class="org-wrap"
        id="org-wrap"
        aria-label="Bagan struktur organisasi kelas"
      ></div>
    </main>

    <footer class="footer-strip container" role="contentinfo">
      <div class="footer-top">
        <div class="footer-copy">
          © <span class="footer-year hl"></span> TKJ XI-9 · SMK Muhammadiyah
          Belitang
        </div>
        <div class="footer-links">
          <a href="../index.html">Beranda</a>
          <a href="members.html">Anggota</a>
        </div>
      </div>
      <div class="footer-social" aria-label="Sosial media kami"></div>
    </footer>

    <button id="back-to-top" aria-label="Kembali ke atas">
      <i class="fas fa-chevron-up" aria-hidden="true"></i>
    </button>

    <!-- Logo Lightbox -->
    <div
      id="logo-lightbox"
      class="logo-lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Logo TKJ XI-9 diperbesar"
    >
      <button
        class="logo-lightbox-close"
        id="logo-lightbox-close"
        aria-label="Tutup logo"
      >
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
      <img
        id="logo-lightbox-img"
        src="../assets/logo/logo-utama.svg"
        alt="Logo TKJ XI-9"
      />
    </div>

    <script src="../index.js"></script>
