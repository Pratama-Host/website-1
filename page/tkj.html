  <body>
    <!-- Animated network background -->
    <canvas id="network-canvas"></canvas>

    <a class="skip-link" href="#main-content">Lewati ke konten utama</a>
    <div id="page-progress" aria-hidden="true"></div>

    <header class="top-bar" role="banner">
      <div class="top-bar-brand">
        <a href="../index.html" aria-label="TKJ XI-9 — Beranda">
          <img
            id="brand-logo"
            src="../assets/logo/logo-utama.svg"
            alt="Logo TKJ XI-9"
            class="brand-badge brand-logo"
            role="button"
            tabindex="0"
            aria-label="Klik untuk memperbesar logo"
          />
          <div>
            <div class="brand-name">TKJ XI-9</div>
            <div class="brand-year mono">2025/2026</div>
          </div>
        </a>
      </div>
      <div class="top-bar-actions">
        <!-- Theme toggle & hamburger will be placed here by JS -->
      </div>
    </header>

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="../index.html"
        ><i class="fas fa-house" aria-hidden="true"></i> Beranda</a
      >
      <i class="fas fa-chevron-right" aria-hidden="true"></i>
      <span class="bc-current" aria-current="page">TKJ</span>
    </nav>

    <main class="page container" id="main-content">
      <!-- Hero TKJ -->
      <div class="tkj-hero reveal" style="--d: 0s">
        <div class="sec-tag" style="margin-bottom: 12px">Jurusan</div>
        <h1>Apa Itu TKJ?</h1>
        <p id="tkj-desc"></p>
      </div>

      <div class="tkj-grid">
        <!-- Mata Pelajaran -->
        <div class="card tkj-card card-accent-top reveal" style="--d: 0.08s">
          <div class="icon-box" aria-hidden="true">
            <i class="fas fa-book-open"></i>
          </div>
          <h3>Mata Pelajaran</h3>
          <div
            class="mapel-list"
            id="tkj-mapel"
            aria-label="Daftar mata pelajaran TKJ"
          ></div>
        </div>

        <!-- Kurikulum -->
        <div class="card tkj-card card-accent-top reveal" style="--d: 0.16s">
          <div class="icon-box" aria-hidden="true">
            <i class="fas fa-layer-group"></i>
          </div>
          <h3>Alur Kurikulum</h3>
          <div
            class="kurikulum-list"
            id="tkj-kurikulum"
            aria-label="Alur kurikulum TKJ per kelas"
          ></div>
        </div>

        <!-- Prospek Karir -->
        <div
          class="card tkj-card card-accent-top reveal"
          style="grid-column: 1/-1; --d: 0.24s"
        >
          <div class="icon-box" aria-hidden="true">
            <i class="fas fa-briefcase"></i>
          </div>
          <h3>Prospek Karir</h3>
          <div
            class="karir-list"
            id="tkj-karir"
            aria-label="Daftar prospek karir lulusan TKJ"
          ></div>
        </div>

        <!-- TKJ Tools: Subnet Calculator -->
        <div class="card tkj-card card-accent-top reveal" style="--d: 0.32s">
          <div class="icon-box" aria-hidden="true">
            <i class="fas fa-network-wired"></i>
          </div>
          <h3>Subnet Calculator</h3>
          <p class="text-sm">Masukkan IP/CIDR (contoh: 192.168.1.1/24)</p>
          <div style="display: flex; gap: 8px; margin-top: 8px">
            <input
              id="subnet-input"
              class="input"
              placeholder="192.168.1.1/24"
              aria-label="Input IP dan CIDR"
            />
            <button id="subnet-calc-btn" class="btn">Hitung</button>
          </div>
          <div
            id="subnet-result"
            style="
              margin-top: 12px;
              font-family: &quot;Fira Code&quot;, monospace;
              font-size: 0.9rem;
              color: var(--text-2);
            "
          ></div>
        </div>

        <!-- TKJ Tools: Ping Simulator -->
        <div class="card tkj-card card-accent-top reveal" style="--d: 0.4s">
          <div class="icon-box" aria-hidden="true">
            <i class="fas fa-broadcast-tower"></i>
          </div>
          <h3>Ping Simulator</h3>
          <p class="text-sm">Simulasi ping visual ke server kelas</p>
          <div
            style="
              display: flex;
              gap: 8px;
              margin-top: 8px;
              align-items: center;
            "
          >
            <input
              id="ping-host"
              class="input"
              placeholder="tkj-xi9.smkn1"
              aria-label="Host untuk diping"
            />
            <button id="ping-btn" class="btn">Ping</button>
          </div>
          <div
            id="ping-log"
            style="
              margin-top: 12px;
              font-family: &quot;Fira Code&quot;, monospace;
              font-size: 0.9rem;
              color: var(--text-2);
            "
          ></div>
        </div>
      </div>
    </main>

    <footer class="footer-strip container" role="contentinfo">
      <div class="footer-top">
        <div class="footer-copy">
          © <span class="footer-year hl"></span> TKJ XI-9 · SMK Muhammadiyah
          Belitang
        </div>
        <div class="footer-links">
          <a href="../index.html">Beranda</a>
          <a href="skills.html">Skills</a>
        </div>
      </div>
      <div class="footer-social" aria-label="Sosial media kami"></div>
    </footer>

    <button id="back-to-top" aria-label="Kembali ke atas">
      <i class="fas fa-chevron-up" aria-hidden="true"></i>
    </button>

    <!-- Logo Lightbox -->
    <div
      id="logo-lightbox"
      class="logo-lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Logo TKJ XI-9 diperbesar"
    >
      <button
        class="logo-lightbox-close"
        id="logo-lightbox-close"
        aria-label="Tutup logo"
      >
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
      <img
        id="logo-lightbox-img"
        src="../assets/logo/logo-utama.svg"
        alt="Logo TKJ XI-9"
      />
    </div>

    <script src="../settings.js"></script>
    <script src="../index.js"></script>
